name: Release Packages

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS packages
    runs-on: macos-14
    timeout-minutes: 45
    env:
      COMFYFLOW_VERSION: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize release version
        shell: bash
        run: |
          VERSION="${COMFYFLOW_VERSION#v}"
          echo "COMFYFLOW_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS packages
        run: pnpm package:macos

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/ComfyFlow-*-darwin-*-portable.zip
            dist/ComfyFlow-*-darwin-*.pkg
          overwrite_files: true

  build-windows:
    name: Build Windows packages
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      COMFYFLOW_VERSION: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize release version
        shell: pwsh
        run: |
          $version = $env:COMFYFLOW_VERSION -replace '^v', ''
          "COMFYFLOW_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows packages
        run: pnpm package:windows

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/ComfyFlow-*-win32-*-portable.zip
            dist/ComfyFlow-*-win32-*-setup.exe
          overwrite_files: true
